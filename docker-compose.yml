version: "3.9"
services:
  redis-manager:
    image: redis:7-alpine
    container_name: redis-manager
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-streams:
    image: redis:7-alpine
    container_name: redis-streams
    ports:
      - "6380:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-1:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api-1
    environment:
      - PORT=3001
      - INSTANCE_ID=api-1
      - REDIS_MANAGER_URL=redis://redis-manager:6379
      - REDIS_STREAMS_URL=redis://redis-streams:6379
    depends_on:
      redis-manager:
        condition: service_healthy
      redis-streams:
        condition: service_healthy

  api-2:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api-2
    environment:
      - PORT=3001
      - INSTANCE_ID=api-2
      - REDIS_MANAGER_URL=redis://redis-manager:6379
      - REDIS_STREAMS_URL=redis://redis-streams:6379
    depends_on:
      redis-manager:
        condition: service_healthy
      redis-streams:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nginx-glb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
